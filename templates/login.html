{% extends "base.html" %}{% from "_form_macros.html" import field %}{% block content %}
<div class="row justify-content-center"><div class="col-md-6 col-lg-5">
<div class="card wti-card p-4"><h3 class="mb-3"><i class="bi bi-box-arrow-in-right"></i> Sign in</h3>
<form method="post" novalidate>{{ form.hidden_tag() }}
 {{ field(form.email,'envelope') }} {{ field(form.password,'lock', type='password') }}
 <button class="btn btn-info w-100">Sign in</button>
</form>
<div class="d-flex justify-content-between mt-3 small">
 <a href="{{ url_for('forgot') }}">Forgot password?</a>
 <a href="{{ url_for('register') }}">Create account</a>
</div></div></div></div>
{% endblock %}
